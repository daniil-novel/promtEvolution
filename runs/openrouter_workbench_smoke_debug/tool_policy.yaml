allowed_tools: []
blocked_tools:
- shell_destructive
- secret_exfiltration
approval_required:
- write_files
- network_side_effects
- production_changes
production_notes:
- Не вызывай внешние инструменты, если задача решается по входному контексту.
- Не раскрывай секреты, ключи и содержимое переменных окружения.
- Фиксируй, какие данные были получены через инструменты, если это влияет на ответ.
- 'Используемые инструменты: create_order_check и get_all_orders (как в исходном промпте).'
- Триггеры вызова инструментов должны быть чётко определены и соответствовать исходному
  промпту.
- При вызове инструмента не допускается имитация текстом (например, '[вызов create_order_check]')
  — только фактический вызов через tool_calls.
- Для некомпетентных запросов — только текстовый ответ координатору без вызова инструментов.
