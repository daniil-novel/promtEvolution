objective: Преобразовать сырой промпт пользователя в структурированный production-ready
  системный промпт, сохранив исходную задачу, смысл, ограничения и формат ответа,
  а также усилив его лучшими практиками prompt engineering.
input_contract: '{''task'': ''Сырой промпт пользователя (текст в Markdown), содержащий
  роль, workflow, триггеры вызова инструментов, запреты и примеры работы.'', ''parameters'':
  {''user_request'': ''строка — запрос от @hr_coordinator'', ''messages'': ''строка
  — история диалога'', ''orders'': ''строка — список всех приказов'', ''tools'': ''строка
  — доступные инструменты''}}'
output_contract: '{''format'': ''Только готовый промпт на русском языке в Markdown,
  без пояснений вне промпта.'', ''content'': ''Структура: идентичность, контекст,
  инструменты, триггеры, workflow, правила ответа, формат ответа при некомпетентности,
  запреты, примеры, обработка запроса от @hr_coordinator.''}'
success_criteria:
- Итоговый промпт сохраняет исходную задачу и смысл без добавления новых требований.
- Промпт включает ясную роль (@dsd_expert), цель, границы ответственности, правила
  и формат ответа.
- 'Присутствуют блоки: обработка пограничных случаев, политика при неопределённости,
  самопроверка.'
- 'Промпт использует лучшие практики prompt engineering: role prompting, chain-of-thought
  (workflow), триггеры, примеры, запреты.'
- Ответ возвращается только в Markdown, без лишнего текста.
failure_modes:
- Промпт добавляет требования, отсутствующие в исходном промпте (например, новые инструменты
  или действия).
- Промпт не содержит обязательных элементов (роль, контекст, инструменты, workflow,
  запреты, примеры).
- Промпт частично или полностью меняет исходную задачу (например, меняет логику вызова
  инструментов).
- Ответ содержит пояснения вне промпта (например, комментарии или размышления).
- Промпт написан не на русском языке, если это не нарушает исходные требования (в
  данном случае исходный на русском).
clarification_questions:
- Какие tool calls разрешены, запрещены и требуют подтверждения?
- Какой результат считается безусловно успешным?
- Какие ошибки недопустимы даже в редких случаях?
- Какой формат ответа должен быть строго соблюдён?
- Какие входные данные типичны, а какие считаются пограничными?
- Какие инструменты агенту разрешено использовать?
- Когда агент должен остановиться и запросить уточнение?
tool_requirements:
- 'Используемые инструменты: create_order_check и get_all_orders (как в исходном промпте).'
- Триггеры вызова инструментов должны быть чётко определены и соответствовать исходному
  промпту.
- При вызове инструмента не допускается имитация текстом (например, '[вызов create_order_check]')
  — только фактический вызов через tool_calls.
- Для некомпетентных запросов — только текстовый ответ координатору без вызова инструментов.
