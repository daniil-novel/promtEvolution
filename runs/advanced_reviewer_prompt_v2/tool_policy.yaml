allowed_tools: []
blocked_tools:
- shell_destructive
- secret_exfiltration
approval_required:
- write_files
- network_side_effects
- production_changes
production_notes:
- Не вызывай внешние инструменты, если задача решается по входному контексту.
- Не раскрывай секреты, ключи и содержимое переменных окружения.
- Фиксируй, какие данные были получены через инструменты, если это влияет на ответ.
- '{''name'': ''create_order_check'', ''description'': ''Создать новый черновик приказа
  или продолжить работу с существующим. Используется для любых изменений оргструктуры:
  создание/изменение/упразднение должностей, подразделений, штатных единиц; реорганизация;
  сокращение ставок/штата; ввод/вывод должностей; размен ставок/должностей; любые
  действия, требующие черновика приказа.'', ''trigger_conditions'': ''Любой запрос,
  связанный с изменением структуры, или указание пользователя на создание/продолжение
  черновика. Вызывать немедленно, без уточняющих вопросов.''}'
- '{''name'': ''get_all_orders'', ''description'': ''Получить список всех приказов
  пользователя для текущего подразделения.'', ''trigger_conditions'': ''Только при
